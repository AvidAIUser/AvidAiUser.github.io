<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --accent:    #6c63ff;
      --accent-g:  rgba(108,99,255,0.2);
      --text:      #e8e8f0;
      --muted:     #8888aa;
      --dim:       #555575;
      --border:    rgba(255,255,255,0.07);
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    /* Logo */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: -2px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.4);
    }

    .logo-name {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Clock */
    #clock {
      font-size: 64px;
      font-weight: 200;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
    }

    #date {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    /* Search bar */
    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 0 20px;
      width: 560px;
      max-width: 90vw;
      height: 52px;
      gap: 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.25);
    }

    .search-icon {
      color: var(--muted);
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
    }

    #search-input::placeholder { color: var(--dim); }

    /* Quick links */
    .quicklinks {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 560px;
    }

    .quicklink {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 80px;
      cursor: pointer;
      text-decoration: none;
    }

    .quicklink-icon {
      width: 52px;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .quicklink:hover .quicklink-icon {
      background: var(--accent-g);
      border-color: rgba(108,99,255,0.4);
      transform: translateY(-2px);
    }

    .quicklink-label {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-mark">SV</div>
    <span class="logo-name">SV Browser</span>
  </div>

  <div>
    <div id="clock">00:00</div>
    <div id="date"></div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search or enter address…" autocomplete="off" autofocus />
  </div>

  <div class="quicklinks">
    <a class="quicklink" href="https://google.com">
      <div class="quicklink-icon">🔍</div>
      <span class="quicklink-label">Google</span>
    </a>
    <a class="quicklink" href="https://github.com">
      <div class="quicklink-icon">🐙</div>
      <span class="quicklink-label">GitHub</span>
    </a>
    <a class="quicklink" href="https://youtube.com">
      <div class="quicklink-icon">▶️</div>
      <span class="quicklink-label">YouTube</span>
    </a>
    <a class="quicklink" href="https://news.ycombinator.com">
      <div class="quicklink-icon">🔶</div>
      <span class="quicklink-label">HN</span>
    </a>
    <a class="quicklink" href="https://wikipedia.org">
      <div class="quicklink-icon">📖</div>
      <span class="quicklink-label">Wikipedia</span>
    </a>
    <a class="quicklink" href="https://reddit.com">
      <div class="quicklink-icon">👾</div>
      <span class="quicklink-label">Reddit</span>
    </a>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      document.getElementById('date').textContent =
        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    }
    updateClock();
    setInterval(updateClock, 10000);

    // Search — communicate with parent via postMessage (BrowserView can't use contextBridge)
    const input = document.getElementById('search-input');
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && input.value.trim()) {
        window.location.href =
          'https://www.google.com/search?q=' + encodeURIComponent(input.value.trim());
      }
    });

    // Quick links open in same tab
    document.querySelectorAll('.quicklink').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        window.location.href = link.href;
      });
    });
  </script>
</body>
</html>
