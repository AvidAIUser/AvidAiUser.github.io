<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SV Browser</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ══════ TOOLBAR ══════ -->
  <div id="toolbar">
    <div id="nav-buttons">
      <button id="btn-back" class="nav-btn" title="Go Back (Alt+←)" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Go Forward (Alt+→)" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Reload (Ctrl+R)">
        <!-- Reload icon -->
        <svg class="icon-reload" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
        <!-- Stop icon -->
        <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
      <button id="btn-home" class="nav-btn" title="Home (Alt+Home)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
    </div>

    <div id="address-bar-wrap">
      <span id="security-icon" class="secure" title="Secure connection">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5l-8-3zm0 10.99h6c-.47 3.27-2.81 6.2-6 7.37V13H6V6.3l6-2.25v8.94z"/></svg>
      </span>
      <input id="address-bar" type="text" spellcheck="false"
             placeholder="Search or enter an address…" autocomplete="off" />
      <button id="btn-bookmark-add" class="icon-btn" title="Bookmark this page (Ctrl+D)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
      </button>
    </div>

    <div id="toolbar-actions">
      <button id="btn-new-tab" class="nav-btn" title="New Tab (Ctrl+T)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button id="btn-settings" class="nav-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>

  <!-- ══════ TAB BAR ══════ -->
  <div id="tab-bar">
    <div id="tabs-container"></div>
  </div>

  <!-- ══════ BOOKMARK BAR ══════ -->
  <div id="bookmark-bar" class="visible">
    <div id="bookmarks-list"></div>
    <button id="btn-manage-bm" class="icon-btn small" title="Manage Bookmarks">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
  </div>

  <!-- ══════ FIND BAR ══════ -->
  <div id="find-bar">
    <input id="find-input" type="text" placeholder="Find in page…" spellcheck="false" />
    <span id="find-count"></span>
    <button id="find-prev" class="icon-btn" title="Previous (Shift+Enter)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
    </button>
    <button id="find-next" class="icon-btn" title="Next (Enter)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>
    <button id="find-close" class="icon-btn" title="Close (Esc)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <!-- ══════ BOOKMARK MODAL ══════ -->
  <div id="bm-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Bookmarks</h2>
        <button id="bm-modal-close" class="icon-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="bm-modal-list"></div>
    </div>
  </div>

  <!-- ══════ DOWNLOAD SHELF ══════ -->
  <div id="download-shelf"></div>

  <!-- ══════ STATUS BAR ══════ -->
  <div id="status-bar"><span id="status-text"></span></div>

  <!-- ══════ TOAST ══════ -->
  <div id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
